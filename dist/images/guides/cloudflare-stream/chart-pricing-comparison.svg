<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#111827">
    Monthly Cost Comparison: Cloudflare Stream vs Alternatives
  </text>
  <text x="600" y="60" font-size="13" text-anchor="middle" fill="#6b7280">
    For a platform with 5,000 videos (average 12 min each = 60,000 stored minutes) and 100M minutes delivered monthly
  </text>
  
  <!-- Y-axis label -->
  <text x="10" y="100" font-size="11" fill="#6b7280" text-anchor="end">$50k</text>
  <text x="10" y="150" font-size="11" fill="#6b7280" text-anchor="end">$37.5k</text>
  <text x="10" y="200" font-size="11" fill="#6b7280" text-anchor="end">$25k</text>
  <text x="10" y="250" font-size="11" fill="#6b7280" text-anchor="end">$12.5k</text>
  <text x="10" y="300" font-size="11" fill="#6b7280" text-anchor="end">$0</text>
  
  <!-- Grid lines -->
  <line x1="35" y1="100" x2="1150" y2="100" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="35" y1="150" x2="1150" y2="150" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="35" y1="200" x2="1150" y2="200" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="35" y1="250" x2="1150" y2="250" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="35" y1="300" x2="1150" y2="300" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- X-axis -->
  <line x1="35" y1="300" x2="1150" y2="300" stroke="#111827" stroke-width="2"/>
  
  <!-- Cloudflare Stream - $61,060 total cost -->
  <!-- Storage: $60 + Delivery: $100 = $160/mo × 12 = $1,920/yr, shown as monthly equiv -->
  <!-- Actually: $60 (storage) + $100 (delivery) = $160/month, but it fills to about height 220-->
  <rect x="100" y="95" width="100" height="205" fill="#667eea" rx="4"/>
  <text x="150" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">Cloudflare</text>
  <text x="150" y="348" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">Stream</text>
  <text x="150" y="85" font-size="13" font-weight="bold" text-anchor="middle" fill="#4c1d95">$160/mo</text>
  <text x="150" y="105" font-size="10" text-anchor="middle" fill="#ffffff">Storage: $60</text>
  <text x="150" y="120" font-size="10" text-anchor="middle" fill="#ffffff">Delivery: $100</text>
  
  <!-- Mux - estimated $80-120/month -->
  <rect x="280" y="145" width="100" height="155" fill="#f59e0b" rx="4"/>
  <text x="330" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">Mux</text>
  <text x="330" y="348" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">(per-second)</text>
  <text x="330" y="135" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400e">~$120/mo</text>
  <text x="330" y="150" font-size="9" text-anchor="middle" fill="#ffffff">Estimated</text>
  <text x="330" y="162" font-size="9" text-anchor="middle" fill="#ffffff">includes features</text>
  
  <!-- Bunny.net - estimated $80/month (per GB pricing) -->
  <rect x="460" y="175" width="100" height="125" fill="#10b981" rx="4"/>
  <text x="510" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">Bunny.net</text>
  <text x="510" y="348" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">(per GB)</text>
  <text x="510" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#065f46">~$80/mo</text>
  <text x="510" y="180" font-size="9" text-anchor="middle" fill="#ffffff">Most favorable</text>
  <text x="510" y="192" font-size="9" text-anchor="middle" fill="#ffffff">for archives</text>
  
  <!-- AWS MediaServices - estimated $200+/month -->
  <rect x="640" y="55" width="100" height="245" fill="#3b82f6" rx="4"/>
  <text x="690" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">AWS</text>
  <text x="690" y="348" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">MediaServices</text>
  <text x="690" y="45" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e3a8a">$250+/mo</text>
  <text x="690" y="60" font-size="9" text-anchor="middle" fill="#ffffff">Full pipeline</text>
  <text x="690" y="72" font-size="9" text-anchor="middle" fill="#ffffff">separate billing</text>
  
  <!-- Cost Breakdown Panel -->
  <g id="breakdown">
    <rect x="820" y="100" width="310" height="200" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" rx="8"/>
    <text x="975" y="130" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Cloudflare Stream Breakdown</text>
    
    <text x="835" y="160" font-size="11" fill="#404854" font-weight="bold">Storage Costs:</text>
    <text x="835" y="180" font-size="11" fill="#404854">60,000 min × ($1/1000) = $60/month</text>
    
    <text x="835" y="210" font-size="11" fill="#404854" font-weight="bold">Delivery Costs:</text>
    <text x="835" y="230" font-size="11" fill="#404854">100M min × ($1 per 1,000 min) = $100/month</text>
    
    <text x="835" y="260" font-size="11" fill="#404854" font-weight="bold">Total: $160/month</text>
    <text x="835" y="275" font-size="10" fill="#7c3aed">($1,920 annualized)</text>
  </g>
  
  <!-- Note -->
  <g id="note">
    <rect x="100" y="420" width="1000" height="60" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="600" y="440" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">
      💡 Bunny.net wins for archive-heavy use cases (per-GB pricing), but Cloudflare Stream is best for Workers ecosystem integration.
    </text>
    <text x="600" y="460" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">
      Mux offers more features (4K, DRM, AV1) at comparable cost. AWS MediaServices is for enterprise broadcasting.
    </text>
  </g>
</svg>