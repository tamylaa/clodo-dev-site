<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#111827">
    Codec Bandwidth Comparison: H.264 vs Modern Codecs
  </text>
  <text x="600" y="60" font-size="14" text-anchor="middle" fill="#6b7280">
    Relative bandwidth required at equivalent visual quality (1080p, 30fps)
  </text>
  
  <!-- Y-axis label -->
  <text x="15" y="100" font-size="12" fill="#6b7280" text-anchor="end">10 Mbps</text>
  <text x="15" y="170" font-size="12" fill="#6b7280" text-anchor="end">7.5 Mbps</text>
  <text x="15" y="240" font-size="12" fill="#6b7280" text-anchor="end">5 Mbps</text>
  <text x="15" y="310" font-size="12" fill="#6b7280" text-anchor="end">2.5 Mbps</text>
  <text x="15" y="380" font-size="12" fill="#6b7280" text-anchor="end">0 Mbps</text>
  
  <!-- Grid lines -->
  <line x1="40" y1="100" x2="1150" y2="100" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="40" y1="170" x2="1150" y2="170" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="40" y1="240" x2="1150" y2="240" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="310" x2="1150" y2="310" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="40" y1="380" x2="1150" y2="380" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- X-axis -->
  <line x1="40" y1="380" x2="1150" y2="380" stroke="#111827" stroke-width="2"/>
  
  <!-- Bars -->
  <!-- H.264 (Cloudflare Stream) - 10 Mbps -->
  <rect x="120" y="100" width="80" height="280" fill="#ef4444" rx="4"/>
  <text x="160" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">H.264</text>
  <text x="160" y="430" font-size="11" text-anchor="middle" fill="#6b7280">(Stream only)</text>
  <text x="160" y="75" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">10 Mbps</text>
  
  <!-- VP9 - 4 Mbps -->
  <rect x="280" y="239" width="80" height="141" fill="#f59e0b" rx="4"/>
  <text x="320" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">VP9</text>
  <text x="320" y="430" font-size="11" text-anchor="middle" fill="#6b7280">(Bunny.net)</text>
  <text x="320" y="224" font-size="14" font-weight="bold" text-anchor="middle" fill="#b45309">4 Mbps</text>
  
  <!-- AV1 - 2.2 Mbps -->
  <rect x="440" y="303" width="80" height="77" fill="#10b981" rx="4"/>
  <text x="480" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">AV1</text>
  <text x="480" y="430" font-size="11" text-anchor="middle" fill="#6b7280">(YouTube, Mux)</text>
  <text x="480" y="286" font-size="14" font-weight="bold" text-anchor="middle" fill="#065f46">2.2 Mbps</text>
  
  <!-- HEVC - 3.5 Mbps -->
  <rect x="600" y="255" width="80" height="125" fill="#3b82f6" rx="4"/>
  <text x="640" y="410" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">HEVC</text>
  <text x="640" y="430" font-size="11" text-anchor="middle" fill="#6b7280">(Not in Stream)</text>
  <text x="640" y="240" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">3.5 Mbps</text>
  
  <!-- Cost Impact -->
  <g id="cost-impact">
    <rect x="100" y="470" width="1000" height="25" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="600" y="489" font-size="13" font-weight="bold" text-anchor="middle" fill="#991b1b">
      ⚠️  H.264 = 4.5x more bandwidth cost than AV1 | 2.5x more than VP9 | Higher edge delivery bills at scale
    </text>
  </g>
  
  <!-- Key insight -->
  <g id="insight">
    <rect x="820" y="100" width="310" height="250" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" rx="8"/>
    <text x="975" y="130" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Why This Matters</text>
    
    <text x="835" y="160" font-size="11" fill="#404854" font-weight="bold">• Cost per GB increases 4.5x</text>
    <text x="835" y="180" font-size="11" fill="#404854">when using H.264 vs AV1</text>
    
    <text x="835" y="210" font-size="11" fill="#404854" font-weight="bold">• At 10M minutes/month:</text>
    <text x="835" y="230" font-size="11" fill="#404854">H.264 = $50,000 delivery</text>
    <text x="835" y="250" font-size="11" fill="#404854">AV1 = $11,000 delivery</text>
    
    <text x="835" y="280" font-size="11" fill="#404854" font-weight="bold">• Modern devices (2021+)</text>
    <text x="835" y="300" font-size="11" fill="#404854">support AV1 natively</text>
    
    <text x="835" y="330" font-size="10" fill="#7c3aed" font-weight="bold">➜ Budget for 3-4x higher CDN costs if</text>
    <text x="835" y="345" font-size="10" fill="#7c3aed" font-weight="bold">using Stream instead of AV1-capable platform</text>
  </g>
</svg>