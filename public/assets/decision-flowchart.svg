<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box{fill:#ffffff;stroke:#2b6cb0;stroke-width:2;rx:6;}
    .text{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#0b1220}
    .title{font-weight:700;font-size:16px}
    .arrow{stroke:#2b6cb0;stroke-width:2;fill:none;marker-end:url(#arrowhead)}
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0" />
    </marker>
  </defs>
  <rect x="20" y="20" width="860" height="380" rx="8" fill="#f7fafc" stroke="#cbd5e1"/>

  <rect class="box" x="60" y="50" width="220" height="56" />
  <text x="170" y="83" text-anchor="middle" class="text title">Start: Define Requirements</text>

  <rect class="box" x="340" y="50" width="220" height="56" />
  <text x="450" y="83" text-anchor="middle" class="text">Assess Latency Needs</text>

  <path class="arrow" d="M280 78 L340 78" />

  <!-- Latency decision -->
  <rect class="box" x="60" y="150" width="220" height="56" />
  <text x="170" y="183" text-anchor="middle" class="text">P95 target &lt; 50ms</text>
  <rect class="box" x="340" y="150" width="220" height="56" />
  <text x="450" y="183" text-anchor="middle" class="text">50–150ms (Hybrid)</text>
  <rect class="box" x="620" y="150" width="220" height="56" />
  <text x="730" y="183" text-anchor="middle" class="text">&gt;150ms (Cloud)</text>

  <path class="arrow" d="M450 106 L450 150" />
  <path class="arrow" d="M170 106 L170 150" />
  <path class="arrow" d="M730 106 L730 150" />

  <!-- Further checks -->
  <rect class="box" x="60" y="250" width="300" height="56" />
  <text x="210" y="283" text-anchor="middle" class="text">Check Data Gravity & Compliance</text>

  <rect class="box" x="400" y="250" width="300" height="56" />
  <text x="550" y="283" text-anchor="middle" class="text">Evaluate Cost & Ops Maturity</text>

  <path class="arrow" d="M170 206 L210 250" />
  <path class="arrow" d="M450 206 L540 250" />

  <!-- Recommendation -->
  <rect class="box" x="200" y="330" width="500" height="56" />
  <text x="450" y="363" text-anchor="middle" class="text title">Recommendation: Edge / Cloud / Hybrid + Pilot plan</text>

  <path class="arrow" d="M360 306 L360 330" />
  <path class="arrow" d="M540 306 L540 330" />

  <!-- Legend -->
  <text x="80" y="396" class="text">Tip: Pilot a representative slice of traffic; measure P95/P99, cost/1M reqs, error rate.</text>
</svg>
